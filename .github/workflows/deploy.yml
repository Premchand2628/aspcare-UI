name: Deploy Frontend to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/var/www/carwash"
          strip_components: 1
          overwrite: true

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Remove any stale .bak files in sites-enabled that cause duplicate listen conflicts
            sudo find /etc/nginx/sites-enabled/ -name "*bak*" -delete
            # Remove any proxy_cache_path lines previously injected into nginx.conf
            sudo sed -i '/proxy_cache_path.*carwash_api_cache/d' /etc/nginx/nginx.conf
            sudo sed -i '/proxy_cache_lock_timeout/d' /etc/nginx/nginx.conf
            sudo sed -i '/proxy_cache_lock on/d' /etc/nginx/nginx.conf
            sudo nginx -t && sudo systemctl reload nginx
