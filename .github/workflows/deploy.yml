name: Deploy Frontend to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/var/www/carwash"
          strip_components: 1
          overwrite: true

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Ensure proxy_cache_path is configured in nginx.conf
            if ! grep -q "carwash_api_cache" /etc/nginx/nginx.conf; then
              sudo sed -i '/^http {/a\    proxy_cache_path /var/cache/nginx/carwash keys_zone=carwash_api_cache:10m max_size=200m inactive=24h use_temp_path=off;\n    proxy_cache_lock on;\n    proxy_cache_lock_timeout 5s;' /etc/nginx/nginx.conf
            fi
            sudo nginx -t
            sudo systemctl reload nginx
