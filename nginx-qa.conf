server {
    listen 80;
    server_name qa.aspcarcare.com;

    root /var/www/carwash-qa;
    index index.html;

    # ------------------------------------------------------------------
    # Add ONCE to /etc/nginx/nginx.conf http {} block:
    #   proxy_cache_path /var/cache/nginx/carwash_api levels=1:2
    #                    keys_zone=carwash_api_cache:10m
    #                    max_size=200m inactive=24h use_temp_path=off;
    # ------------------------------------------------------------------

    # Cacheable reference data — serve stale on backend error/timeout so the
    # UI never sees a 504 for these endpoints.
    location ~ ^/(deal-prices|services|rates|carwashrates|centres)(/|$) {
        proxy_pass http://127.0.0.1:10080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    15s;
        proxy_send_timeout    10s;

        proxy_cache              carwash_api_cache;
        proxy_cache_methods      GET HEAD;
        proxy_cache_key          "$scheme$request_method$host$request_uri$http_authorization";
        proxy_cache_valid        200 5m;
        proxy_cache_valid        404 30s;
        proxy_cache_use_stale    error timeout updating http_500 http_502 http_503 http_504 http_429;
        proxy_cache_background_update on;
        proxy_cache_lock         on;
        proxy_ignore_headers     Cache-Control Set-Cookie Vary;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # API proxy - same production backend
    location ~ ^/(users|auth|otp|bookings|quotations|payments|support|chat|agent-chat|tickets|memberships|coupons|admin|api)(/|$) {
        proxy_pass http://127.0.0.1:10080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    # Static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
