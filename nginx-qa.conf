server {
    server_name qa.aspcarcare.com;

    root /var/www/carwash-qa;
    index index.html;

    # Separate log files for QA
    access_log /var/log/carwash/qa/nginx-access.log;
    error_log  /var/log/carwash/qa/nginx-error.log;

    # ── Security headers (requires server_tokens off; at http scope) ──
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=(), payment=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://checkout.razorpay.com https://accounts.google.com https://connect.facebook.net https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://checkout.razorpay.com https://accounts.google.com https://graph.facebook.com; frame-src https://api.razorpay.com https://checkout.razorpay.com https://accounts.google.com https://www.facebook.com; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Block scanner/probe requests (archives, backups, common exploits) ──
    location ~* \.(zip|tar|tar\.gz|tgz|rar|7z|bak|sql|dump|backup|old|swp)$ {
        access_log off;
        return 444;
    }
    location ~* (?:^|/)(?:wp-admin|wp-login|wordpress|phpmyadmin|pma|adminer|xmlrpc|\.env|\.git|\.svn|\.htaccess|\.aws|\.ssh|id_rsa|config\.php|web\.config|composer\.(?:json|lock)|package\.json|\.DS_Store)(?:/|$) {
        access_log off;
        return 444;
    }

    # ── Rate-limited auth surface (5 req/min per IP) ──
    location ~ ^/auth/(?:login/send-otp|login/verify-otp|send-otp|send-otp-generic|verify-otp|check-phone|forgot-password|reset-password) {
        limit_req zone=auth_zone burst=10 nodelay;
        proxy_pass http://127.0.0.1:10081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Environment qa;
        proxy_read_timeout 90;
    }

    # ── Security: Block direct browser access to API ──
    # Public endpoints - only allow app requests with X-Transaction-Id
    location ~ ^/(services|centres|rates|carwashrates|deal-prices|coupons)(/|$) {
        if ($http_x_transaction_id = "") {
            return 403;
        }
        proxy_pass http://127.0.0.1:10081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Environment qa;
        proxy_read_timeout 90;
    }

    # Authenticated API routes - QA backend on port 10081
    location ~ ^/(users|auth|otp|bookings|quotations|payments|support|chat|agent-chat|tickets|memberships|admin|api)(/|$) {
        proxy_pass http://127.0.0.1:10081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Environment qa;
        proxy_read_timeout 90;
    }

    # Static assets (access logging disabled to reduce Loki noise)
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
        expires 30d;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/qa.aspcarcare.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/qa.aspcarcare.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = qa.aspcarcare.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name qa.aspcarcare.com;
    return 404; # managed by Certbot
}
