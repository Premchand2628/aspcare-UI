# =============================================================================
# nginx HTTP-scope hardening: rate-limit zones + global security defaults.
#
# INSTALL:
#   sudo cp nginx-http-hardening.conf /etc/nginx/conf.d/00-hardening.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# This file must live under /etc/nginx/conf.d/ so it is included in the http{}
# block (which is where limit_req_zone / map directives are allowed).
# Per-site confs (nginx-aspcarcare.conf, nginx-qa.conf, nginx-stg.conf) then
# reference the zones by name via `limit_req zone=auth_zone ...`.
# =============================================================================

# ---- Rate-limit zones (keyed by client IP) ---------------------------------
# 10 MB of state → ~160 000 distinct IPs tracked.
#
# auth_zone    : for /auth/* endpoints (OTP send, OTP verify, login,
#                forgot-password). Very strict — 5 req/min per IP.
# api_zone     : for authenticated API surface. Loose — 60 req/min per IP.
#
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_zone:10m  rate=60r/m;

# Return 429 (Too Many Requests) instead of the default 503 when throttled.
limit_req_status 429;

# ---- Proxy cache for public read-only endpoints ----------------------------
# Path must exist with nginx-user ownership: sudo mkdir -p /var/cache/nginx/public_api
#   sudo chown -R www-data:www-data /var/cache/nginx/public_api
# 100 MB of body, 10 MB of keys (~80k entries), purged after 60m of inactivity.
proxy_cache_path /var/cache/nginx/public_api
                 levels=1:2
                 keys_zone=public_api_cache:10m
                 max_size=100m
                 inactive=60m
                 use_temp_path=off;

# ---- Global hardening -------------------------------------------------------
# Hide nginx version from Server: header and error pages.
server_tokens off;
