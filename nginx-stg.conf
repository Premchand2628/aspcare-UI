server {
    listen 80;
    server_name stg.aspcarcare.com;

    root /var/www/carwash-stg;
    index index.html;

    # API proxy - same production backend
    location ~ ^/(users|auth|otp|bookings|quotations|centres|payments|support|chat|agent-chat|tickets|memberships|rates|carwashrates|deal-prices|services|coupons|admin|api)(/|$) {
        proxy_pass http://127.0.0.1:10080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    # Static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
