server {
    listen 80;
    listen [::]:80;
    server_name aspcarcare.com www.aspcarcare.com 43.205.204.87;

    root /var/www/carwash;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # ------------------------------------------------------------------
    # NOTE: The proxy_cache_path directive must live in the http {} block
    # of /etc/nginx/nginx.conf (or a snippet under /etc/nginx/conf.d/).
    # Add this once, then this server block can use `carwash_api_cache`:
    #
    #   proxy_cache_path /var/cache/nginx/carwash_api levels=1:2
    #                    keys_zone=carwash_api_cache:10m
    #                    max_size=200m inactive=24h use_temp_path=off;
    #   proxy_cache_lock on;
    #   proxy_cache_lock_timeout 5s;
    # ------------------------------------------------------------------

    # Cacheable, public, idempotent reference data.
    # Backend slow / 504 / timeout? -> serve last good copy from nginx cache.
    # This makes /deal-prices, /services, /rates/* and /centres feel as fast
    # and reliable as a static file.
    location ~ ^/(deal-prices|services|rates|carwashrates|centres)(/|$) {
        proxy_pass http://127.0.0.1:10080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    15s;
        proxy_send_timeout    10s;

        # Only cache GETs; ignore upstream Cache-Control: no-cache so we can
        # serve stale content even if the backend says otherwise.
        proxy_cache              carwash_api_cache;
        proxy_cache_methods      GET HEAD;
        proxy_cache_key          "$scheme$request_method$host$request_uri$http_authorization";
        proxy_cache_valid        200 5m;
        proxy_cache_valid        404 30s;
        proxy_cache_use_stale    error timeout updating http_500 http_502 http_503 http_504 http_429;
        proxy_cache_background_update on;
        proxy_cache_lock         on;
        proxy_ignore_headers     Cache-Control Set-Cookie Vary;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # All other API routes - proxy to Spring Cloud Gateway on port 10080
    location ~ ^/(users|auth|otp|bookings|quotations|payments|support|chat|agent-chat|tickets|memberships|coupons|admin|api)(/|$) {
        proxy_pass http://127.0.0.1:10080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Increased to absorb occasional backend slowness (e.g. cold OTP path).
        proxy_connect_timeout 10s;
        proxy_read_timeout    90s;
        proxy_send_timeout    30s;
    }

    # Static assets with caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # SPA fallback - serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
