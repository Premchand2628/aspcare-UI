server {
    server_name aspcarcare.com www.aspcarcare.com 43.205.204.87;

    root /var/www/carwash;
    index index.html;

    # Separate log files for production
    access_log /var/log/carwash/prod/nginx-access.log;
    error_log  /var/log/carwash/prod/nginx-error.log warn;

    # ── Security headers ──
    # Requires `server_tokens off;` at http scope (see nginx-http-hardening.conf).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=(), payment=(self)" always;
    # CSP: relaxed first pass. Tighten script-src once inline scripts are removed.
    # Razorpay/Google/Facebook SDKs need explicit hosts.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://checkout.razorpay.com https://accounts.google.com https://connect.facebook.net https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https://checkout.razorpay.com https://accounts.google.com https://graph.facebook.com; frame-src https://api.razorpay.com https://checkout.razorpay.com https://accounts.google.com https://www.facebook.com; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # ── Block scanner/probe requests (archives, backups, common exploits) ──
    # Returns 444 (close connection without response) — no bandwidth, no log.
    location ~* \.(zip|tar|tar\.gz|tgz|rar|7z|bak|sql|dump|backup|old|swp)$ {
        access_log off;
        return 444;
    }
    location ~* (?:^|/)(?:wp-admin|wp-login|wordpress|phpmyadmin|pma|adminer|xmlrpc|\.env|\.git|\.svn|\.htaccess|\.aws|\.ssh|id_rsa|config\.php|web\.config|composer\.(?:json|lock)|package\.json|\.DS_Store)(?:/|$) {
        access_log off;
        return 444;
    }

    # ── Rate-limited auth surface ──
    # 5 req/min per IP (see auth_zone in nginx-http-hardening.conf).
    # Blocks brute force against OTP / login / forgot-password.
    # Must come before the generic /auth catch-all below.
    location ~ ^/auth/(?:login/send-otp|login/verify-otp|send-otp|send-otp-generic|verify-otp|check-phone|forgot-password|reset-password) {
        limit_req zone=auth_zone burst=10 nodelay;
        proxy_pass http://127.0.0.1:10080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Environment prod;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # ── Edge cache for public, read-only catalogue endpoints ──
    # Hits backend at most once per cache window per nginx node.
    # Bypass with `Cache-Control: no-cache` from the client during testing.
    location = /services {
        if ($http_x_transaction_id = "") { return 403; }
        proxy_cache public_api_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_lock on;
        proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_key "$scheme$host$request_uri";
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_pass http://127.0.0.1:10080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Environment prod;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    location = /deal-prices {
        if ($http_x_transaction_id = "") { return 403; }
        proxy_cache public_api_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_lock on;
        proxy_cache_use_stale updating error timeout http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_key "$scheme$host$request_uri$http_authorization";
        add_header X-Cache-Status $upstream_cache_status always;
        proxy_pass http://127.0.0.1:10080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Environment prod;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # ── Security: Block direct browser access to API ──
    # Public endpoints (no JWT required) - only allow app requests with X-Transaction-Id
    location ~ ^/(services|centres|rates|carwashrates|deal-prices|coupons)(/|$) {
        if ($http_x_transaction_id = "") {
            return 403;
        }
        proxy_pass http://127.0.0.1:10080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Environment prod;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # Authenticated API routes - proxy to PROD Spring Cloud Gateway on port 10080
    # These already require JWT Bearer token, so direct browser access returns 401/403 from backend
    location ~ ^/(users|auth|otp|bookings|quotations|payments|support|chat|agent-chat|tickets|memberships|admin|api)(/|$) {
        proxy_pass http://127.0.0.1:10080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Environment prod;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # Static assets with caching (access logging disabled to reduce Loki noise)
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /images/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
        expires 30d;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # SPA fallback - serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/aspcarcare.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/aspcarcare.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.aspcarcare.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = aspcarcare.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name aspcarcare.com www.aspcarcare.com 43.205.204.87;
    return 404; # managed by Certbot
}
